# docker-compose.yml — Generated for Spring Boot + Angular
version: '3.8'

services:

  backend:
    build:
      context: ./To-Do-List-App-SpringBoot
      dockerfile: Dockerfile
    container_name: app_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./To-Do-List-App-Angular
      dockerfile: Dockerfile
    container_name: app_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
