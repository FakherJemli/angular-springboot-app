name: Java CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-To-Do-List-App-SpringBoot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./To-Do-List-App-SpringBoot
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          cache-dependency-path: ./To-Do-List-App-SpringBoot/pom.xml

      - name: Build (tests skipped by default)
        run: mvn -B -DskipTests package
      #   mvn -B verify

      - name: (DevopsGen - failures above are ignored)
        if: always()
        run: echo "CI completed – review any warnings above to ensure build is healthy"
